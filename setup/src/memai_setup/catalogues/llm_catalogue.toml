# LLM catalogue — manually maintained. Every model here must be an Ollama pull
# target. Keep min_vram_gb conservative: assessed fit reserves an extra
# ~3 GB headroom on top of this for Whisper + Kokoro (see domain/services.py).
# `reasoning = true` means the model emits a <think>...</think> block that
# gets spoken aloud by TTS — think:false does not suppress it for
# thinking-tuned models (see project_known_issues memory). Never set this
# blindly; verify against the model's own docs.
#
# VRAM figures are estimated from each model's Ollama/Q4 quantized download
# size plus headroom for KV-cache/context, except llama3.3 which uses the
# empirical figure from real testing (see project_known_issues memory: ~57 GB
# loaded at Q4_K_M on an RTX 4090, not just its ~43 GB download size).
#
# Landscape surveyed 2026-07-01 (Ollama library + vendor docs) to broaden
# beyond "whatever happened to be pulled on the GPU workstation already" —
# spans small (~4-8 GB), mid (~8-14 GB), and high-VRAM (~20-24 GB+) tiers,
# multiple vendors, all non-reasoning except the qwen3:14b cautionary entry.

[[models]]
model_id = "aya-expanse"
display_name = "Aya Expanse (8B)"
min_vram_gb = 5.0
recommended_vram_gb = 8.0
languages = ["en", "fr", "es", "de", "it", "pt", "ja", "ko", "zh", "ar", "hi", "ru"]
recommended = true
reasoning = false
description = "Multilingual, no reasoning overhead. Current default — fast and reliable for voice conversation, proven on the GPU server."

[[models]]
model_id = "llama3.1:8b"
display_name = "Llama 3.1 (8B)"
min_vram_gb = 5.0
recommended_vram_gb = 8.0
languages = ["en", "de", "fr", "it", "pt", "hi", "es", "th"]
recommended = false
reasoning = false
description = "Meta's ecosystem alternative to Aya Expanse at the same VRAM tier. Officially supports 8 languages (narrower than Aya Expanse's 12)."

