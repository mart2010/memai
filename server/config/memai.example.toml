# Mémai server configuration — example file (safe to commit)
# Copy to your platform config directory and rename to memai.toml:
#   Linux/macOS : ~/.config/memai/memai.toml
#   Windows     : %LOCALAPPDATA%\memai\memai.toml
# Or run `memai-setup` to generate it automatically.
#
# Fixed sections ([server], [database], [stt], [llm], [memory]) require re-running
# the installation wizard to change.
#
# [voice_configurable] is the only section the GeneralAssistant can read and
# mutate at runtime via voice commands.

[server]
ws_port = 8765
log_dir = "logs/sessions"
# Minutes of no new session after a clean disconnect before the offline pipeline
# (TurnLogReplayer -> ConsolidateMemory -> GenerateMemoryBrief) fires.
idle_consolidation_minutes = 5.0

[database]
# Standard libpq DSN — adjust host/port/credentials as needed.
url = "postgresql://memai:changeme@localhost:5432/memai"

[stt]
# Path to a pre-downloaded faster-whisper model directory, or a model name
# that faster-whisper will download on first run (e.g. "small", "medium").
# Avoid large models — they compete for VRAM with the LLM and TTS.
model_path = "~/models/faster-whisper-small"
device = "cuda"
compute_type = "float16"  # use int8 if VRAM is tight

[llm]
# Avoid large (~70B-class) models — they don't fit in VRAM alongside Whisper +
# Kokoro and get cold-reloaded between turns. Avoid reasoning models (e.g.
# qwen3) — their <think> blocks get spoken aloud.
model = "aya-expanse"
# ollama_host = "http://localhost:11434"  # uncomment if Ollama is not on localhost

[memory]
# Cosine similarity thresholds for the consolidation upsert decision (see CLAUDE.md's
# "Upsert similarity threshold" section). Above merge_threshold: auto-merge into the
# existing record. Between disambiguate_threshold and merge_threshold: ask the LLM
# disambiguator. Below disambiguate_threshold: insert as a new record.
# Defaults are placeholders pending calibration against real usage data.
merge_threshold = 0.93
disambiguate_threshold = 0.75

[voice_configurable]
# primary_language is voice-configurable (set once during onboarding, changeable
# later by talking to the GA) but is NOT stored here — it lives in the `users`
# table in Postgres (see User.primary_language / UserRepository). This section
# is reserved for future voice-configurable settings that don't already have a
# domain entity of their own, e.g.:
# llm_temperature = 0.7
