# Mémai server configuration — example file (safe to commit)
# Copy to your platform config directory and rename to memai.toml:
#   Linux/macOS : ~/.config/memai/memai.toml
#   Windows     : %LOCALAPPDATA%\memai\memai.toml
# Or run `memai-setup` to generate it automatically.
#
# This file holds only bootstrap-before-DB-exists settings, needed to construct
# the DB connection/services themselves. Every voice-configurable or domain-meaningful
# setting lives in the DB instead, as an attribute of the entity that owns it
# (User or AssistantPersona) — e.g. idle_consolidation_minutes is a User field,
# tts_voice/speaking_rate are AssistantPersona fields. Changing any setting in this
# file requires re-running the installation wizard.

[server]
ws_port = 8765
log_dir = "logs/sessions"
# Single-host deployment: the client reads this same file (same platform config path)
# and only looks at [server].ws_port — nothing more to add. The client-only ssh_host
# key (see client/config/memai.example.toml) must stay OMITTED here: its absence is
# what tells the client that the server is local (no SSH tunnel needed).
# Split-host deployment: the client machine gets its own memai.toml with ssh_host set.

[database]
# Standard libpq DSN. memai-setup defaults to peer auth (Linux/macOS) — no
# password stored anywhere, since Postgres and the server always run on the
# same machine: postgresql:///memai?user=memai (empty host = local Unix
# socket; requires a one-time pg_ident.conf mapping, see docs/INSTALL_SERVER.md).
# Falls back to a password DSN below for remote Postgres or Windows (which has
# no `peer` auth — its equivalent, `sspi`, isn't yet supported here).
url = "postgresql://memai:changeme@localhost:5432/memai"

[stt]
# Path to a pre-downloaded faster-whisper model directory, or a model name
# that faster-whisper will download on first run (e.g. "small", "medium").
# Avoid large models — they compete for VRAM with the LLM and TTS.
# memai-setup sets device/compute_type automatically based on whether a CUDA
# GPU was detected. device = "cuda" or "cpu" (no other backend is supported —
# see CLAUDE.md). compute_type = "float16" pairs with cuda; "int8" with cpu
# (faster-whisper/CTranslate2 doesn't support float16 compute on most CPUs).
model_path = "~/models/faster-whisper-small"
device = "cuda"
compute_type = "float16"

[tts]
# device = "cuda" or "cpu", same rule as [stt].device above — memai-setup sets
# this automatically. Omitting this section entirely falls back to Kokoro's
# own torch.cuda.is_available() auto-detection.
device = "cuda"

[llm]
# Avoid large (~70B-class) models — they don't fit in VRAM alongside Whisper +
# Kokoro and get cold-reloaded between turns. Avoid reasoning models (e.g.
# qwen3) — their <think> blocks get spoken aloud.
model = "aya-expanse"
# ollama_host = "http://localhost:11434"  # uncomment if Ollama is not on localhost

[languages]
# The installed-languages contract (FR-705): the languages selected during
# memai-setup, i.e. the ones whose TTS voices were actually pulled. Bounds the
# onboarding primary-language selection and the GeneralAssistant's per-turn
# response-language mirroring; a detected language outside this list triggers a
# spoken reminder to re-run the wizard. Omitting the section treats every
# supported language (SUPPORTED_LANGUAGES) as installed.
installed = ["en", "fr", "es", "it", "pt", "ja", "zh-cn"]

[memory]
# Cosine similarity thresholds for the consolidation upsert decision (see CLAUDE.md's
# "Upsert similarity threshold" section). Above merge_threshold: auto-merge into the
# existing record. Between disambiguate_threshold and merge_threshold: ask the LLM
# disambiguator. Below disambiguate_threshold: insert as a new record.
# Defaults are placeholders pending calibration against real usage data.
merge_threshold = 0.93
disambiguate_threshold = 0.75
