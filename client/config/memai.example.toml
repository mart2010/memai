# Mémai client configuration — example file (safe to commit)
# Copy to your platform config directory and rename to memai.toml:
#   Linux/macOS : ~/.config/memai/memai.toml
#   Windows     : %LOCALAPPDATA%\memai\memai.toml
# Or run `memai-setup --client` to generate it automatically.

[server]
ws_port = 8765
# ssh_host = "user@your-gpu-hostname"  # omit entirely for single-host (local) deployment
